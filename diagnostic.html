<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PlanWise Diagnostic Tool</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0c11;
            color: #ffffff;
            margin: 0;
            padding: 20px;
            line-height: 1.6;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: #1a1d24;
            border-radius: 12px;
            padding: 24px;
            border: 1px solid #2a2d34;
        }
        
        h1 {
            color: #5accff;
            margin-bottom: 24px;
            text-align: center;
        }
        
        .section {
            margin-bottom: 24px;
            padding: 16px;
            background: #252830;
            border-radius: 8px;
            border: 1px solid #3a3d44;
        }
        
        .section h2 {
            color: #5accff;
            margin-top: 0;
            margin-bottom: 16px;
        }
        
        .status {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: bold;
            text-transform: uppercase;
        }
        
        .status.success {
            background: #10b981;
            color: white;
        }
        
        .status.error {
            background: #ef4444;
            color: white;
        }
        
        .status.warning {
            background: #f59e0b;
            color: white;
        }
        
        .status.info {
            background: #3b82f6;
            color: white;
        }
        
        .test-result {
            margin: 8px 0;
            padding: 8px;
            background: #1e2127;
            border-radius: 4px;
            border-left: 4px solid #3a3d44;
        }
        
        .test-result.success {
            border-left-color: #10b981;
        }
        
        .test-result.error {
            border-left-color: #ef4444;
        }
        
        .test-result.warning {
            border-left-color: #f59e0b;
        }
        
        button {
            background: #5accff;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            margin: 8px 8px 8px 0;
            transition: background 0.2s;
        }
        
        button:hover {
            background: #4bb8e6;
        }
        
        button:disabled {
            background: #6b7280;
            cursor: not-allowed;
        }
        
        .log {
            background: #1e2127;
            border: 1px solid #3a3d44;
            border-radius: 4px;
            padding: 12px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            max-height: 200px;
            overflow-y: auto;
            white-space: pre-wrap;
        }
        
        .actions {
            text-align: center;
            margin: 24px 0;
        }
        
        .summary {
            background: #252830;
            padding: 16px;
            border-radius: 8px;
            margin-bottom: 24px;
        }
        
        .summary h3 {
            margin-top: 0;
            color: #5accff;
        }
        
        .summary-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 16px;
            margin-top: 16px;
        }
        
        .stat {
            text-align: center;
            padding: 12px;
            background: #1e2127;
            border-radius: 6px;
        }
        
        .stat-value {
            font-size: 24px;
            font-weight: bold;
            color: #5accff;
        }
        
        .stat-label {
            font-size: 12px;
            color: #9ca3af;
            margin-top: 4px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔧 PlanWise Diagnostic Tool</h1>
        
        <div class="summary">
            <h3>System Status</h3>
            <div class="summary-stats">
                <div class="stat">
                    <div class="stat-value" id="servicesCount">-</div>
                    <div class="stat-label">Services</div>
                </div>
                <div class="stat">
                    <div class="stat-value" id="testsPassed">-</div>
                    <div class="stat-label">Tests Passed</div>
                </div>
                <div class="stat">
                    <div class="stat-value" id="testsFailed">-</div>
                    <div class="stat-label">Tests Failed</div>
                </div>
                <div class="stat">
                    <div class="stat-value" id="storageKeys">-</div>
                    <div class="stat-label">Storage Keys</div>
                </div>
            </div>
        </div>
        
        <div class="actions">
            <button onclick="runDiagnostics()">🔍 Run Diagnostics</button>
            <button onclick="runHealthCheck()">🏥 Health Check</button>
            <button onclick="runTests()">🧪 Run Tests</button>
            <button onclick="clearStorage()">🗑️ Clear Storage</button>
            <button onclick="openMainApp()">🚀 Open PlanWise</button>
        </div>
        
        <div class="section">
            <h2>Service Status</h2>
            <div id="serviceStatus"></div>
        </div>
        
        <div class="section">
            <h2>Test Results</h2>
            <div id="testResults"></div>
        </div>
        
        <div class="section">
            <h2>Storage Information</h2>
            <div id="storageInfo"></div>
        </div>
        
        <div class="section">
            <h2>Console Log</h2>
            <div class="log" id="consoleLog"></div>
        </div>
    </div>

    <script>
        // Capture console logs
        const originalLog = console.log;
        const originalError = console.error;
        const originalWarn = console.warn;
        
        function addToLog(level, ...args) {
            const logElement = document.getElementById('consoleLog');
            const timestamp = new Date().toLocaleTimeString();
            const message = args.map(arg => 
                typeof arg === 'object' ? JSON.stringify(arg, null, 2) : String(arg)
            ).join(' ');
            
            logElement.textContent += `[${timestamp}] ${level.toUpperCase()}: ${message}\n`;
            logElement.scrollTop = logElement.scrollHeight;
        }
        
        console.log = function(...args) {
            originalLog.apply(console, args);
            addToLog('log', ...args);
        };
        
        console.error = function(...args) {
            originalError.apply(console, args);
            addToLog('error', ...args);
        };
        
        console.warn = function(...args) {
            originalWarn.apply(console, args);
            addToLog('warn', ...args);
        };
        
        // Diagnostic functions
        function checkServices() {
            const services = {
                'Auth Service': typeof Auth !== 'undefined',
                'Data Service': typeof window.PlanWiseData !== 'undefined',
                'API Service': typeof window.PlanWiseAPI !== 'undefined',
                'Scheduler Service': typeof window.PlanWiseScheduler !== 'undefined'
            };
            
            const serviceStatus = document.getElementById('serviceStatus');
            serviceStatus.innerHTML = '';
            
            let availableCount = 0;
            
            Object.entries(services).forEach(([name, available]) => {
                const status = available ? 'success' : 'error';
                const statusText = available ? 'Available' : 'Missing';
                
                serviceStatus.innerHTML += `
                    <div class="test-result ${status}">
                        <span class="status ${status}">${statusText}</span>
                        ${name}
                    </div>
                `;
                
                if (available) availableCount++;
            });
            
            document.getElementById('servicesCount').textContent = `${availableCount}/${Object.keys(services).length}`;
            
            return services;
        }
        
        function checkStorage() {
            const storageInfo = document.getElementById('storageInfo');
            storageInfo.innerHTML = '';
            
            try {
                const allKeys = Object.keys(localStorage);
                const planwiseKeys = allKeys.filter(key => key.startsWith('planwise_'));
                
                storageInfo.innerHTML += `
                    <div class="test-result success">
                        <span class="status success">Available</span>
                        LocalStorage is available
                    </div>
                    <div class="test-result info">
                        <span class="status info">Info</span>
                        Total keys: ${allKeys.length}
                    </div>
                    <div class="test-result info">
                        <span class="status info">Info</span>
                        PlanWise keys: ${planwiseKeys.length}
                    </div>
                `;
                
                document.getElementById('storageKeys').textContent = planwiseKeys.length;
                
                if (planwiseKeys.length > 0) {
                    storageInfo.innerHTML += '<h4>PlanWise Storage Keys:</h4>';
                    planwiseKeys.forEach(key => {
                        try {
                            const value = localStorage.getItem(key);
                            const size = new Blob([value]).size;
                            storageInfo.innerHTML += `
                                <div class="test-result info">
                                    <span class="status info">Key</span>
                                    ${key} (${size} bytes)
                                </div>
                            `;
                        } catch (error) {
                            storageInfo.innerHTML += `
                                <div class="test-result error">
                                    <span class="status error">Error</span>
                                    ${key} - ${error.message}
                                </div>
                            `;
                        }
                    });
                }
                
            } catch (error) {
                storageInfo.innerHTML += `
                    <div class="test-result error">
                        <span class="status error">Error</span>
                        LocalStorage error: ${error.message}
                    </div>
                `;
            }
        }
        
        function runTests() {
            const testResults = document.getElementById('testResults');
            testResults.innerHTML = '<div class="test-result info">Running tests...</div>';
            
            const tests = [
                {
                    name: 'Service Availability',
                    test: () => {
                        const services = checkServices();
                        return Object.values(services).every(Boolean);
                    }
                },
                {
                    name: 'Auth Functionality',
                    test: () => {
                        if (typeof Auth === 'undefined') return false;
                        try {
                            const auth = Auth.get();
                            return typeof auth === 'object' || auth === null;
                        } catch (error) {
                            console.error('Auth test failed:', error);
                            return false;
                        }
                    }
                },
                {
                    name: 'Data Service',
                    test: () => {
                        return typeof window.PlanWiseData !== 'undefined';
                    }
                },
                {
                    name: 'LocalStorage',
                    test: () => {
                        try {
                            localStorage.setItem('test', 'test');
                            localStorage.removeItem('test');
                            return true;
                        } catch (error) {
                            return false;
                        }
                    }
                },
                {
                    name: 'DOM Elements',
                    test: () => {
                        return document.body !== null;
                    }
                }
            ];
            
            let passed = 0;
            let failed = 0;
            
            testResults.innerHTML = '';
            
            tests.forEach(test => {
                try {
                    const result = test.test();
                    const status = result ? 'success' : 'error';
                    const statusText = result ? 'Passed' : 'Failed';
                    
                    testResults.innerHTML += `
                        <div class="test-result ${status}">
                            <span class="status ${status}">${statusText}</span>
                            ${test.name}
                        </div>
                    `;
                    
                    if (result) passed++; else failed++;
                } catch (error) {
                    testResults.innerHTML += `
                        <div class="test-result error">
                            <span class="status error">Error</span>
                            ${test.name} - ${error.message}
                        </div>
                    `;
                    failed++;
                }
            });
            
            document.getElementById('testsPassed').textContent = passed;
            document.getElementById('testsFailed').textContent = failed;
            
            console.log(`Tests completed: ${passed} passed, ${failed} failed`);
        }
        
        function runHealthCheck() {
            console.log('Running health check...');
            if (typeof window.runPlanwiseHealthCheck === 'function') {
                window.runPlanwiseHealthCheck();
            } else {
                console.warn('Health check function not available');
            }
        }
        
        function runDiagnostics() {
            console.log('Starting comprehensive diagnostics...');
            checkServices();
            checkStorage();
            runTests();
            console.log('Diagnostics completed');
        }
        
        function clearStorage() {
            if (confirm('Are you sure you want to clear all PlanWise storage? This will reset the application.')) {
                try {
                    const keys = Object.keys(localStorage).filter(key => key.startsWith('planwise_'));
                    keys.forEach(key => localStorage.removeItem(key));
                    console.log(`Cleared ${keys.length} storage keys`);
                    checkStorage();
                    alert('Storage cleared successfully');
                } catch (error) {
                    console.error('Error clearing storage:', error);
                    alert('Error clearing storage: ' + error.message);
                }
            }
        }
        
        function openMainApp() {
            window.open('index.html', '_blank');
        }
        
        // Auto-run diagnostics on load
        window.addEventListener('load', () => {
            console.log('PlanWise Diagnostic Tool loaded');
            runDiagnostics();
        });
    </script>
</body>
</html>
