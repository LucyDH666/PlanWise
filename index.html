<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PlanWise Lite - Core</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="container">
            <div class="header-content">
                <div class="logo">PlanWise Lite</div>
                <nav class="nav">
                    <a href="#dashboard" class="nav-link" data-role="viewer">Dashboard</a>
                    <a href="#planner" class="nav-link" data-role="planner">Planner</a>
                    <a href="#settings" class="nav-link" data-role="viewer">Instellingen</a>
                    <a href="#superadmin" class="nav-link" data-role="superadmin">Super Admin</a>
                    <a href="#logs" class="nav-link" data-role="superadmin">Logs</a>
                    <div style="display: flex; align-items: center; gap: 1rem;">
                        <span id="role-indicator" class="role-badge">-</span>
                        <button class="btn btn-small btn-secondary" onclick="window.app.handleLogout()">Uitloggen</button>
                        <button class="btn btn-small btn-danger" onclick="window.app.handleReset()">Reset App</button>
                    </div>
                </nav>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="main">
        <div class="container">
            <!-- Login Route -->
            <div id="route-login" class="route">
                <div class="card">
                    <h2>Inloggen</h2>
                    <form onsubmit="window.app.handleLogin(event)" class="form">
                        <div class="form-group">
                            <label for="orgSlug">Organisatie</label>
                            <input type="text" id="orgSlug" name="orgSlug" class="form-input" placeholder="organisatie-slug" required>
                        </div>
                        <div class="form-group">
                            <label for="username">Gebruikersnaam</label>
                            <input type="text" id="username" name="username" class="form-input" placeholder="gebruikersnaam" required>
                        </div>
                        <div class="form-group">
                            <label for="password">Wachtwoord</label>
                            <input type="password" id="password" name="password" class="form-input" placeholder="wachtwoord" required>
                        </div>
                        <button type="submit" class="btn btn-primary">Inloggen</button>
                    </form>
                </div>

                <div class="card">
                    <h3>Demo Login</h3>
                    <p>Gebruik deze gegevens om in te loggen:</p>
                    <ul>
                        <li><strong>Organisatie:</strong> superadmin</li>
                        <li><strong>Gebruiker:</strong> superadmin</li>
                        <li><strong>Wachtwoord:</strong> admin123</li>
                    </ul>
                </div>
            </div>

            <!-- Dashboard Route -->
            <div id="route-dashboard" class="route">
                <h2>Dashboard</h2>
                <div id="dashboard-content">
                    <!-- Dashboard content will be loaded here -->
                </div>
            </div>

            <!-- Planner Route -->
            <div id="route-planner" class="route">
                <h2>Planner</h2>
                <div id="planner-content">
                    <!-- Planner content will be loaded here -->
                </div>
            </div>

            <!-- Settings Route -->
            <div id="route-settings" class="route">
                <h2>Instellingen</h2>
                <div id="settings-content">
                    <!-- Settings content will be loaded here -->
                </div>
            </div>

            <!-- Super Admin Route -->
            <div id="route-superadmin" class="route">
                <h2>Super Admin</h2>
                <div id="superadmin-content">
                    <!-- Super admin content will be loaded here -->
                </div>
            </div>

            <!-- Logs Route -->
            <div id="route-logs" class="route">
                <h2>Logs</h2>
                <div id="logs-content">
                    <!-- Logs content will be loaded here -->
                </div>
            </div>
        </div>
    </main>

    <!-- Scripts -->
    <script src="js/logs.js" defer></script>
    <script src="js/ui.js" defer></script>
    <script src="js/data.js" defer></script>
    <script src="js/auth.js" defer></script>
    <script src="js/router.js" defer></script>
    <script src="js/app.js" defer></script>
</body>
</html>
